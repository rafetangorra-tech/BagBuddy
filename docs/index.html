<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bag Buddy — Heavy Bag Training App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: #ffffff;
            color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 48px 24px;
            text-align: center;
        }
        .icon {
            width: 100px;
            height: 100px;
            background: #e03030;
            border-radius: 22px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }
        h1 { font-size: 36px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 8px; }
        .tagline { font-size: 15px; color: #888; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 40px; }
        p { font-size: 16px; line-height: 1.7; color: #444; max-width: 480px; margin-bottom: 48px; }
        .badge {
            display: inline-block;
            background: #1a1a1a;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            padding: 14px 28px;
            border-radius: 50px;
            letter-spacing: 0.5px;
            margin-bottom: 48px;
        }
        .links { font-size: 13px; color: #aaa; }
        .links a { color: #e03030; text-decoration: none; }
        .links a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="icon">🥊</div>
    <h1>Bag Buddy</h1>
    <p class="tagline">Been Hit. Still Grinning.</p>

    <p>The no-nonsense heavy bag training app for boxers and Muay Thai fighters. Spoken combo callouts, configurable rounds, and coach audio — all hands-free so you stay locked in on the bag.</p>

    <div class="badge">Available on the App Store</div>

    <div class="links">
        <a href="privacy-policy.html">Privacy Policy</a>
    </div>

</body>
</html>
